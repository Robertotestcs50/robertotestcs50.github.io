<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <!-- Subtle gradient -->
  <defs>
    <radialGradient id="glow" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FF5C00" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF5C00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Accent line -->
  <rect x="80" y="280" width="60" height="3" fill="#FF5C00" rx="2"/>
  <!-- Name -->
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#FAFAFA" letter-spacing="-2">Roberto Zúñiga</text>
  <!-- Role -->
  <text x="80" y="418" font-family="ui-monospace, monospace" font-size="18" fill="#71717A" letter-spacing="3" text-transform="uppercase">DESIGNER + ENGINEER</text>
  <!-- Dot -->
  <circle cx="1100" cy="315" r="8" fill="#FF5C00"/>
  <!-- URL -->
  <text x="80" y="570" font-family="ui-monospace, monospace" font-size="14" fill="#3F3F46" letter-spacing="2">robertozuniga.github.io</text>
</svg>
